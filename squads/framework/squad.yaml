name: framework
version: 1.0.0
description: "Squad de especialistas em metodologias de vendas para avaliação de reuniões (Meet), mensagens (WhatsApp) e ligações do time comercial"
author: Processos-appmax
license: MIT
slashPrefix: framework

aiox:
  minVersion: "2.1.0"
  type: squad

components:
  agents:
    # Orquestrador
    - coach.md
    # Tier 1 — Core
    - sandler.md
    - spin.md
    - meddic.md
    - challenger.md
    - gap.md
    # Tier 2 — Complementares
    - value-selling.md
    - command.md
    - miller-heiman.md
    # Tier 3 — Cobertura completa
    - bant.md
    - neat.md
    - snap.md

  tasks:
    # Orquestração
    - coach-evaluate.md
    # Avaliações por metodologia
    - sandler-evaluate.md
    - spin-evaluate.md
    - meddic-evaluate.md
    - challenger-evaluate.md
    - gap-evaluate.md
    - value-selling-evaluate.md
    - command-evaluate.md
    - miller-heiman-evaluate.md
    - bant-evaluate.md
    - neat-evaluate.md
    - snap-evaluate.md

  workflows: []
  checklists: []
  templates: []
  tools: []
  scripts: []

config:
  extends: extend
  coding-standards: config/coding-standards.md
  tech-stack: config/tech-stack.md
  source-tree: config/source-tree.md

input_types:
  - meet_transcript: "Transcrição de reunião Google Meet"
  - whatsapp_messages: "Histórico de conversa WhatsApp"
  - call_transcript: "Transcrição de ligação telefônica"

scoring:
  scale: "0-100"
  red_flags_penalty: -10
  green_flags_bonus: +5
  max_bonus: +15

dependencies:
  node: []
  python: []
  squads: []

tags:
  - sales
  - methodology
  - evaluation
  - coaching
  - sandler
  - spin
  - meddic
  - challenger
